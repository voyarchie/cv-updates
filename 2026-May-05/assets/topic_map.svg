<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" role="img"
     aria-labelledby="title desc" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title id="title">Today's topic map: orthogonal threads in dense detection &amp; classification</title>
  <desc id="desc">Six themes radiating from a central node — fusion, distillation,
    video, reliability, pathology, and Gaussian-splat scene understanding.</desc>

  <style>
    .axis  { stroke: currentColor; stroke-width: 1.2; opacity: .65; fill: none; }
    .label { fill: currentColor; font-size: 13px; }
    .title { fill: currentColor; font-size: 15px; font-weight: 600; }
    .small { fill: currentColor; font-size: 11px; opacity: .8; }
    .hub-text { fill: #ffffff; font-size: 14px; font-weight: 700; }
    .leaf-text { fill: #0f172a; font-size: 12.5px; font-weight: 600; }
    .leaf-sub  { fill: #0f172a; font-size: 10.5px; opacity: .85; }
  </style>

  <!-- central hub -->
  <g>
    <circle cx="440" cy="210" r="68" fill="#4f46e5" stroke="#312e81" stroke-width="1.5"/>
    <text class="hub-text" x="440" y="206" text-anchor="middle">Dense detection</text>
    <text class="hub-text" x="440" y="226" text-anchor="middle">&amp; classification</text>
  </g>

  <!-- six leaf nodes around hub -->
  <!-- top-left: fusion -->
  <g>
    <line class="axis" x1="440" y1="210" x2="170" y2="80"/>
    <rect x="30" y="40" width="280" height="76" rx="14" fill="#fbbf24" stroke="#b45309" stroke-width="1.2"/>
    <text class="leaf-text" x="170" y="68" text-anchor="middle">Multi-modal fusion</text>
    <text class="leaf-sub"  x="170" y="86" text-anchor="middle">RGB-T · hyperspectral · SAR · underwater</text>
    <text class="leaf-sub"  x="170" y="102" text-anchor="middle">MD-DETR · GAST · SA-RTDETR · YOLO-MFD</text>
  </g>

  <!-- top-right: distillation -->
  <g>
    <line class="axis" x1="440" y1="210" x2="710" y2="80"/>
    <rect x="570" y="40" width="280" height="76" rx="14" fill="#34d399" stroke="#047857" stroke-width="1.2"/>
    <text class="leaf-text" x="710" y="68" text-anchor="middle">Knowledge distillation</text>
    <text class="leaf-sub"  x="710" y="86" text-anchor="middle">homogeneous · cross-arch · VLM → detector</text>
    <text class="leaf-sub"  x="710" y="102" text-anchor="middle">KD-DETR · DK-DETR · SO-DETR · OD-DETR</text>
  </g>

  <!-- middle-left: video -->
  <g>
    <line class="axis" x1="440" y1="210" x2="160" y2="210"/>
    <rect x="20" y="172" width="280" height="76" rx="14" fill="#60a5fa" stroke="#1d4ed8" stroke-width="1.2"/>
    <text class="leaf-text" x="160" y="200" text-anchor="middle">Video object detection</text>
    <text class="leaf-sub"  x="160" y="218" text-anchor="middle">temporal queries · streaming · world models</text>
    <text class="leaf-sub"  x="160" y="234" text-anchor="middle">TransVOD++ · FAQ · V-JEPA 2.1</text>
  </g>

  <!-- middle-right: reliability -->
  <g>
    <line class="axis" x1="440" y1="210" x2="720" y2="210"/>
    <rect x="580" y="172" width="280" height="76" rx="14" fill="#f472b6" stroke="#9d174d" stroke-width="1.2"/>
    <text class="leaf-text" x="720" y="200" text-anchor="middle">Reliable detection</text>
    <text class="leaf-sub"  x="720" y="218" text-anchor="middle">conformal prediction · risk control · calibration</text>
    <text class="leaf-sub"  x="720" y="234" text-anchor="middle">SeqCRC · 2-step CP · CP-OD</text>
  </g>

  <!-- bottom-left: pathology -->
  <g>
    <line class="axis" x1="440" y1="210" x2="170" y2="340"/>
    <rect x="30" y="304" width="280" height="76" rx="14" fill="#a78bfa" stroke="#5b21b6" stroke-width="1.2"/>
    <text class="leaf-text" x="170" y="332" text-anchor="middle">Whole-slide image detection</text>
    <text class="leaf-sub"  x="170" y="350" text-anchor="middle">gigapixel · MIL · slide-level foundation</text>
    <text class="leaf-sub"  x="170" y="366" text-anchor="middle">Prov-GigaPath · TITAN · MSPT</text>
  </g>

  <!-- bottom-right: 3DGS -->
  <g>
    <line class="axis" x1="440" y1="210" x2="710" y2="340"/>
    <rect x="570" y="304" width="280" height="76" rx="14" fill="#f87171" stroke="#991b1b" stroke-width="1.2"/>
    <text class="leaf-text" x="710" y="332" text-anchor="middle">3D Gaussian-Splat detection</text>
    <text class="leaf-sub"  x="710" y="350" text-anchor="middle">explicit 3D · object-aware · synth data</text>
    <text class="leaf-sub"  x="710" y="366" text-anchor="middle">3DGS-DET · ObjectGS · GS-as-augmenter</text>
  </g>

  <text class="title" x="440" y="22" text-anchor="middle">2026-May-05 — six fresh threads</text>
  <text class="small" x="440" y="402" text-anchor="middle">Hub colour fixed; leaf labels use dark text on warm fills (legible in both light and dark themes); axes &amp; titles use currentColor.</text>
</svg>
