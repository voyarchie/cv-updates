<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" role="img"
     aria-labelledby="t d" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title id="t">Fusion stages in multi-modal detectors</title>
  <desc id="d">Three columns showing early, mid, and late fusion strategies and which 2025–26 detectors land in each.</desc>

  <style>
    .axis  { stroke: currentColor; stroke-width: 1; opacity: .5; fill: none; }
    .lab   { fill: currentColor; font-size: 12px; }
    .head  { fill: currentColor; font-size: 14px; font-weight: 700; }
    .title { fill: currentColor; font-size: 16px; font-weight: 700; }
    .pill  { fill-opacity: .92; }
    .pill-text { fill: #0f172a; font-size: 11.5px; font-weight: 600; }
    .branch { stroke: currentColor; stroke-width: 1.4; fill: none; }
  </style>

  <text class="title" x="440" y="26" text-anchor="middle">Where do you fuse the modalities?</text>

  <!-- Three columns -->
  <!-- Column 1: Early -->
  <g>
    <text class="head" x="146" y="60" text-anchor="middle">Early fusion (pixel / token)</text>
    <rect x="30" y="80" width="232" height="240" rx="14" fill="none" class="axis"/>

    <!-- input streams -->
    <rect x="48" y="100" width="84" height="34" rx="8" class="pill" fill="#fbbf24"/>
    <text class="pill-text" x="90" y="122" text-anchor="middle">RGB</text>
    <rect x="158" y="100" width="84" height="34" rx="8" class="pill" fill="#60a5fa"/>
    <text class="pill-text" x="200" y="122" text-anchor="middle">Thermal / D / HSI</text>

    <!-- merge -->
    <path class="branch" d="M90 134 V 156 H 200 V 134"/>
    <rect x="64" y="160" width="160" height="34" rx="8" class="pill" fill="#34d399"/>
    <text class="pill-text" x="144" y="182" text-anchor="middle">Concatenated tokens</text>

    <!-- shared backbone -->
    <path class="branch" d="M144 194 V 216"/>
    <rect x="64" y="220" width="160" height="34" rx="8" class="pill" fill="#a78bfa"/>
    <text class="pill-text" x="144" y="242" text-anchor="middle">Shared backbone</text>

    <text class="lab" x="144" y="284" text-anchor="middle">Strength: cheap inference</text>
    <text class="lab" x="144" y="302" text-anchor="middle">Risk: modality crosstalk</text>
  </g>

  <!-- Column 2: Mid -->
  <g>
    <text class="head" x="440" y="60" text-anchor="middle">Mid / cross-attention fusion</text>
    <rect x="324" y="80" width="232" height="240" rx="14" fill="none" class="axis"/>

    <rect x="342" y="100" width="84" height="34" rx="8" class="pill" fill="#fbbf24"/>
    <text class="pill-text" x="384" y="122" text-anchor="middle">RGB encoder</text>
    <rect x="452" y="100" width="84" height="34" rx="8" class="pill" fill="#60a5fa"/>
    <text class="pill-text" x="494" y="122" text-anchor="middle">IR encoder</text>

    <path class="branch" d="M384 134 V 158"/>
    <path class="branch" d="M494 134 V 158"/>

    <rect x="342" y="158" width="194" height="38" rx="9" class="pill" fill="#f472b6"/>
    <text class="pill-text" x="439" y="182" text-anchor="middle">Cross-attention / query fusion</text>

    <path class="branch" d="M439 196 V 218"/>
    <rect x="342" y="222" width="194" height="34" rx="8" class="pill" fill="#a78bfa"/>
    <text class="pill-text" x="439" y="244" text-anchor="middle">Detection head</text>

    <text class="lab" x="440" y="284" text-anchor="middle">Strength: modality-balanced features</text>
    <text class="lab" x="440" y="302" text-anchor="middle">Examples: MD-DETR · GCMF-Net</text>
  </g>

  <!-- Column 3: Late -->
  <g>
    <text class="head" x="734" y="60" text-anchor="middle">Late / decision fusion</text>
    <rect x="618" y="80" width="232" height="240" rx="14" fill="none" class="axis"/>

    <rect x="636" y="100" width="84" height="34" rx="8" class="pill" fill="#fbbf24"/>
    <text class="pill-text" x="678" y="122" text-anchor="middle">RGB det.</text>
    <rect x="746" y="100" width="84" height="34" rx="8" class="pill" fill="#60a5fa"/>
    <text class="pill-text" x="788" y="122" text-anchor="middle">IR det.</text>

    <path class="branch" d="M678 134 V 158"/>
    <path class="branch" d="M788 134 V 158"/>

    <rect x="636" y="160" width="194" height="34" rx="8" class="pill" fill="#34d399"/>
    <text class="pill-text" x="733" y="182" text-anchor="middle">Box-level Hungarian / NMS</text>

    <path class="branch" d="M733 194 V 218"/>
    <rect x="636" y="222" width="194" height="34" rx="8" class="pill" fill="#a78bfa"/>
    <text class="pill-text" x="733" y="244" text-anchor="middle">Final detections</text>

    <text class="lab" x="734" y="284" text-anchor="middle">Strength: easy retrofit</text>
    <text class="lab" x="734" y="302" text-anchor="middle">Risk: modality blind to each other</text>
  </g>

  <text class="lab" x="440" y="346" text-anchor="middle">2026 trend: mid-fusion via query exchange dominates RGB-T &amp; RGB-D leaderboards.</text>
</svg>
