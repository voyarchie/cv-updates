<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" role="img"
     aria-label="Self-attention versus selective SSM compute scaling"
     font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .axis  { stroke: currentColor; stroke-width: 1.25; fill: none; }
    .grid  { stroke: currentColor; stroke-width: 0.5; opacity: 0.25; }
    .lbl   { fill: currentColor; font-size: 12px; }
    .hd    { fill: currentColor; font-size: 14px; font-weight: 600; }
    .ann   { fill: currentColor; font-size: 11px; }
    .ssm   { fill: none; stroke: #22c55e; stroke-width: 2.25; }
    .attn  { fill: none; stroke: #6366f1; stroke-width: 2.25; }
    .hyb   { fill: none; stroke: #f59e0b; stroke-width: 2.25; stroke-dasharray: 6 4; }
  </style>

  <text class="hd" x="20" y="24">Token-count scaling: self-attention vs. selective state-space (illustrative)</text>

  <!-- Axes -->
  <line class="axis" x1="70" y1="240" x2="840" y2="240"/>
  <line class="axis" x1="70" y1="60"  x2="70"  y2="240"/>

  <!-- Grid -->
  <g class="grid">
    <line x1="70" y1="200" x2="840" y2="200"/>
    <line x1="70" y1="160" x2="840" y2="160"/>
    <line x1="70" y1="120" x2="840" y2="120"/>
    <line x1="70" y1="80"  x2="840" y2="80"/>
    <line x1="225" y1="60" x2="225" y2="240"/>
    <line x1="380" y1="60" x2="380" y2="240"/>
    <line x1="535" y1="60" x2="535" y2="240"/>
    <line x1="690" y1="60" x2="690" y2="240"/>
  </g>

  <!-- Tick labels -->
  <g class="lbl" text-anchor="middle">
    <text x="70"  y="258">256</text>
    <text x="225" y="258">1k</text>
    <text x="380" y="258">4k</text>
    <text x="535" y="258">16k</text>
    <text x="690" y="258">65k</text>
    <text x="840" y="258">262k tokens</text>
  </g>
  <g class="lbl" text-anchor="end">
    <text x="64" y="244">0</text>
    <text x="64" y="204">0.25</text>
    <text x="64" y="164">0.5</text>
    <text x="64" y="124">0.75</text>
    <text x="64" y="84">1.0 relative cost</text>
  </g>

  <!-- Curves
       attention: O(n^2)  cost = (n / nmax)^2
       ssm:       O(n)    cost = (n / nmax)
       hybrid:    cost ~ 0.35 * (n/nmax) + 0.4 * (n/nmax)^1.4
       Sampled at x positions matching tick locations. -->
  <!-- attention curve -->
  <path class="attn" d="
    M 70 240
    L 99 239.3
    L 128 237.4
    L 157 234.5
    L 186 230.6
    L 225 224.0
    L 264 215.6
    L 303 205.4
    L 342 193.3
    L 380 179.5
    L 419 163.7
    L 458 146.1
    L 497 126.5
    L 535 105.0
    L 574 81.6
    L 613 60.0
    L 690 60.0
    L 840 60.0
  "/>
  <!-- ssm curve (linear) -->
  <path class="ssm" d="
    M 70 240
    L 225 226.8
    L 380 213.6
    L 535 200.4
    L 690 187.2
    L 840 174.0
  "/>
  <!-- hybrid (CNN+Mamba) -->
  <path class="hyb" d="
    M 70 240
    L 225 220
    L 380 199
    L 535 175
    L 690 148
    L 840 117
  "/>

  <!-- Curve labels -->
  <g class="ann">
    <text x="600" y="74">Self-attention · O(n²)</text>
    <text x="700" y="170">CNN+Mamba hybrid (MambaNeXt-YOLO)</text>
    <text x="700" y="195">Selective SSM · O(n)</text>
  </g>

  <!-- Side note -->
  <g class="ann" transform="translate(20,260)">
    <text x="240" y="0">Curves are schematic; absolute constants depend on head/state dimensions.</text>
  </g>
</svg>
