<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" role="img" aria-label="COCO mAP vs T4 latency for 2026 dense detectors" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .title  { font-size: 15px; font-weight: 700; fill: #334155; }
    .sub    { font-size: 11px; fill: #64748b; }
    .axis   { font-size: 10px; fill: #475569; }
    .grid   { stroke: #cbd5e1; stroke-width: 1; }
    .gridLight { stroke: #e2e8f0; stroke-width: 1; }
    .frame  { fill: none; stroke: #94a3b8; stroke-width: 1; }
    .rt     { fill: #14b8a6; fill-opacity: 0.10; stroke: none; }
    .rtTxt  { font-size: 11px; font-weight: 600; fill: #0f766e; }
    .lblTxt { font-size: 11px; fill: #1e293b; font-weight: 500; }
    .legendBox { fill: #ffffff; fill-opacity: 0.9; stroke: #cbd5e1; }
    @media (prefers-color-scheme: dark) {
      .title  { fill: #e2e8f0; }
      .sub    { fill: #94a3b8; }
      .axis   { fill: #cbd5e1; }
      .grid   { stroke: #475569; }
      .gridLight { stroke: #334155; }
      .frame  { stroke: #64748b; }
      .rt     { fill: #14b8a6; fill-opacity: 0.16; }
      .rtTxt  { fill: #5eead4; }
      .lblTxt { fill: #e2e8f0; }
      .legendBox { fill: #0f172a; fill-opacity: 0.85; stroke: #475569; }
    }
  </style>

  <text x="460" y="24" text-anchor="middle" class="title">COCO AP vs. T4/FP16 latency — leading 2026 detectors</text>
  <text x="460" y="42" text-anchor="middle" class="sub">Approximate published numbers; teal band = real-time region (≤10 ms)</text>

  <!-- Plot area: x 80..860 (latency 0..25 ms), y 70..400 (mAP 40..65) -->
  <rect x="80" y="70" width="780" height="330" class="frame"/>
  <rect x="80" y="70" width="312" height="330" class="rt"/>
  <text x="236" y="88" text-anchor="middle" class="rtTxt">Real-time region (≤ 10 ms)</text>

  <!-- Y gridlines: 65 at y=70, 60 at y=136, 55 at y=202, 50 at y=268, 45 at y=334, 40 at y=400 -->
  <g class="gridLight">
    <line x1="80" y1="136" x2="860" y2="136"/>
    <line x1="80" y1="202" x2="860" y2="202"/>
    <line x1="80" y1="268" x2="860" y2="268"/>
    <line x1="80" y1="334" x2="860" y2="334"/>
  </g>
  <g class="axis" text-anchor="end">
    <text x="74" y="74">65</text>
    <text x="74" y="140">60</text>
    <text x="74" y="206">55</text>
    <text x="74" y="272">50</text>
    <text x="74" y="338">45</text>
    <text x="74" y="404">40</text>
  </g>

  <!-- X ticks: 0,5,10,15,20,25 ms -->
  <g class="grid">
    <line x1="80" y1="400" x2="80" y2="406"/>
    <line x1="236" y1="400" x2="236" y2="406"/>
    <line x1="392" y1="400" x2="392" y2="406"/>
    <line x1="548" y1="400" x2="548" y2="406"/>
    <line x1="704" y1="400" x2="704" y2="406"/>
    <line x1="860" y1="400" x2="860" y2="406"/>
  </g>
  <g class="axis" text-anchor="middle">
    <text x="80" y="420">0</text>
    <text x="236" y="420">5</text>
    <text x="392" y="420">10</text>
    <text x="548" y="420">15</text>
    <text x="704" y="420">20</text>
    <text x="860" y="420">25</text>
  </g>
  <text x="470" y="445" text-anchor="middle" class="axis">T4/TensorRT FP16 latency (ms)</text>
  <text x="22" y="235" text-anchor="middle" class="axis" transform="rotate(-90 22 235)">COCO AP @ [.50:.95]</text>

  <!-- helper formulas:
       x = 80 + (lat/25)*780 = 80 + lat*31.2
       y = 400 - (mAP-40)/25 * 330 = 400 - (mAP-40)*13.2
  -->

  <!-- YOLO-family (blue) -->
  <g>
    <!-- YOLO26-N 1.6 ms / 41 -->
    <circle cx="130" cy="387" r="5" fill="#2563eb" stroke="#1e40af" stroke-width="1.3"/>
    <text x="138" y="384" class="lblTxt">YOLO26-N</text>
    <!-- YOLO26-S 2.5 ms / 45.6 -->
    <circle cx="158" cy="326" r="6" fill="#2563eb" stroke="#1e40af" stroke-width="1.3"/>
    <text x="166" y="324" class="lblTxt">YOLO26-S</text>
    <!-- YOLOv13-S 3.5 ms / 48 -->
    <circle cx="189" cy="294" r="6" fill="#2563eb" stroke="#1e40af" stroke-width="1.3"/>
    <text x="197" y="292" class="lblTxt">YOLOv13-S</text>
    <!-- YOLO26-M 5.5 ms / 51.2 -->
    <circle cx="252" cy="252" r="6" fill="#2563eb" stroke="#1e40af" stroke-width="1.3"/>
    <text x="260" y="250" class="lblTxt">YOLO26-M</text>
  </g>

  <!-- DETR-family real-time (red) -->
  <g>
    <!-- RF-DETR-N 2.3 ms / 48 -->
    <circle cx="152" cy="294" r="6" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.3"/>
    <text x="92" y="290" class="lblTxt">RF-DETR-N</text>
    <!-- DEIMv2-S 3.2 ms / 50.9 -->
    <circle cx="180" cy="256" r="6" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.3"/>
    <text x="92" y="252" class="lblTxt">DEIMv2-S</text>
    <!-- RF-DETR-M 4.5 ms / 54.7 -->
    <circle cx="220" cy="206" r="7" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.3"/>
    <text x="228" y="204" class="lblTxt">RF-DETR-M</text>
    <!-- RF-DETR-L 6.8 ms / 56.5 -->
    <circle cx="292" cy="182" r="7" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.3"/>
    <text x="300" y="180" class="lblTxt">RF-DETR-L</text>
    <!-- DEIMv2-X 8.5 ms / 57.8 -->
    <circle cx="345" cy="165" r="7" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.3"/>
    <text x="353" y="163" class="lblTxt">DEIMv2-X</text>
    <!-- RF-DETR-2XL 12.6 ms / 60.1 -->
    <circle cx="473" cy="134" r="8" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.5"/>
    <text x="481" y="132" class="lblTxt" font-weight="700">RF-DETR-2XL</text>
  </g>

  <!-- Hybrid / refinement (purple) -->
  <g>
    <!-- RT-DETRv3-L 9 ms / 54.6 -->
    <circle cx="361" cy="207" r="6" fill="#9333ea" stroke="#581c87" stroke-width="1.3"/>
    <text x="369" y="205" class="lblTxt">RT-DETRv3-L</text>
    <!-- D-FINE-X 12 ms / 55.8 -->
    <circle cx="454" cy="191" r="6" fill="#9333ea" stroke="#581c87" stroke-width="1.3"/>
    <text x="462" y="189" class="lblTxt">D-FINE-X</text>
    <!-- DEIM-D-FINE-X 12.8 ms / 56.5 -->
    <circle cx="479" cy="182" r="6" fill="#9333ea" stroke="#581c87" stroke-width="1.3"/>
    <text x="487" y="178" class="lblTxt">DEIM-D-FINE-X</text>
  </g>

  <!-- Offline SOTA (teal/green) -->
  <g>
    <!-- Co-DINO Swin-L 22 ms / 64 -->
    <circle cx="766" cy="83" r="7" fill="#0d9488" stroke="#134e4a" stroke-width="1.3"/>
    <text x="774" y="81" class="lblTxt">Co-DINO Swin-L</text>
    <!-- DETA Swin-L 24 ms / 63.5 -->
    <circle cx="829" cy="93" r="7" fill="#0d9488" stroke="#134e4a" stroke-width="1.3"/>
    <text x="700" y="93" class="lblTxt">DETA Swin-L</text>
  </g>

  <!-- Legend -->
  <g transform="translate(640,295)">
    <rect class="legendBox" width="210" height="92" rx="8"/>
    <circle cx="14" cy="20" r="5" fill="#2563eb"/>
    <text x="26" y="24" class="lblTxt">YOLO family</text>
    <circle cx="14" cy="40" r="5" fill="#dc2626"/>
    <text x="26" y="44" class="lblTxt">DETR / DINOv3-backed (real-time)</text>
    <circle cx="14" cy="60" r="5" fill="#9333ea"/>
    <text x="26" y="64" class="lblTxt">Hybrid / refinement</text>
    <circle cx="14" cy="80" r="5" fill="#0d9488"/>
    <text x="26" y="84" class="lblTxt">Heavy / offline SOTA</text>
  </g>
</svg>
