<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" role="img" aria-label="2026 dense detection landscape: COCO mAP vs T4 latency">
  <style>
    .axis  { stroke: currentColor; stroke-width: 1.2; opacity: 0.7; }
    .tick  { stroke: currentColor; stroke-width: 0.8; opacity: 0.4; }
    .label { fill: currentColor; font: 12px sans-serif; }
    .title { fill: currentColor; font: 600 14px sans-serif; }
    .sub   { fill: currentColor; font: 11px sans-serif; opacity: 0.75; }
    .pt    { stroke: currentColor; stroke-width: 1; }
    .yolo  { fill: #f59e0b; }
    .detr  { fill: #6366f1; }
    .deim  { fill: #ec4899; }
    .dfine { fill: #10b981; }
    .rt    { fill: #06b6d4; }
    .leg   { fill: currentColor; font: 11px sans-serif; }
  </style>

  <text x="380" y="22" text-anchor="middle" class="title">Real-time dense detection on COCO val (T4, TensorRT FP16) — 2026 snapshot</text>
  <text x="380" y="40" text-anchor="middle" class="sub">Approximate published numbers; size encodes parameter budget</text>

  <!-- axes -->
  <line x1="80"  y1="400" x2="720" y2="400" class="axis"/>
  <line x1="80"  y1="80"  x2="80"  y2="400" class="axis"/>

  <!-- x ticks: latency 0..20 ms -->
  <g class="label" text-anchor="middle">
    <line x1="80"  y1="400" x2="80"  y2="406" class="tick"/><text x="80"  y="420">0</text>
    <line x1="208" y1="400" x2="208" y2="406" class="tick"/><text x="208" y="420">4</text>
    <line x1="336" y1="400" x2="336" y2="406" class="tick"/><text x="336" y="420">8</text>
    <line x1="464" y1="400" x2="464" y2="406" class="tick"/><text x="464" y="420">12</text>
    <line x1="592" y1="400" x2="592" y2="406" class="tick"/><text x="592" y="420">16</text>
    <line x1="720" y1="400" x2="720" y2="406" class="tick"/><text x="720" y="420">20</text>
  </g>
  <text x="400" y="442" text-anchor="middle" class="label">End-to-end latency on T4 (ms, lower is better)</text>

  <!-- y ticks: mAP 40..62 -->
  <g class="label" text-anchor="end">
    <line x1="74" y1="400" x2="80" y2="400" class="tick"/><text x="70" y="404">40</text>
    <line x1="74" y1="342" x2="80" y2="342" class="tick"/><text x="70" y="346">45</text>
    <line x1="74" y1="284" x2="80" y2="284" class="tick"/><text x="70" y="288">50</text>
    <line x1="74" y1="226" x2="80" y2="226" class="tick"/><text x="70" y="230">55</text>
    <line x1="74" y1="168" x2="80" y2="168" class="tick"/><text x="70" y="172">60</text>
  </g>
  <text x="28" y="240" text-anchor="middle" class="label" transform="rotate(-90 28 240)">COCO AP@[.5:.95] (higher is better)</text>

  <!-- gridlines (subtle) -->
  <g class="tick">
    <line x1="80" y1="342" x2="720" y2="342"/>
    <line x1="80" y1="284" x2="720" y2="284"/>
    <line x1="80" y1="226" x2="720" y2="226"/>
    <line x1="80" y1="168" x2="720" y2="168"/>
  </g>

  <!-- Approximate points: x = 80 + lat*32, y = 400 - (mAP-40)*11.6 -->
  <!-- YOLO26 nano   ~40.5 mAP @ 1.6 ms -->
  <circle cx="131" cy="394" r="5" class="pt yolo"/>
  <text x="138" y="397" class="leg">YOLO26-n</text>
  <!-- YOLO26 m       ~51.5 @ 4.5 ms -->
  <circle cx="224" cy="267" r="7" class="pt yolo"/>
  <text x="232" y="270" class="leg">YOLO26-m</text>
  <!-- YOLO26 x       ~55.5 @ 8.0 ms -->
  <circle cx="336" cy="220" r="9" class="pt yolo"/>
  <text x="344" y="223" class="leg">YOLO26-x</text>

  <!-- D-FINE-S       ~48.7 @ 3.5 ms -->
  <circle cx="192" cy="299" r="6" class="pt dfine"/>
  <text x="200" y="302" class="leg">D-FINE-S</text>
  <!-- D-FINE-X       ~59.3 @ 12.9 ms -->
  <circle cx="493" cy="176" r="9" class="pt dfine"/>
  <text x="501" y="179" class="leg">D-FINE-X</text>

  <!-- DEIMv2 Pico    ~42.1 @ 1.9 ms (1.5M params) -->
  <circle cx="141" cy="376" r="4" class="pt deim"/>
  <text x="148" y="379" class="leg">DEIMv2-Pico</text>
  <!-- DEIMv2-S       ~53.0 @ 4.0 ms -->
  <circle cx="208" cy="249" r="6" class="pt deim"/>
  <text x="216" y="252" class="leg">DEIMv2-S</text>
  <!-- DEIMv2-X       ~60.2 @ 11.5 ms -->
  <circle cx="448" cy="166" r="9" class="pt deim"/>
  <text x="456" y="169" class="leg">DEIMv2-X</text>

  <!-- RF-DETR-N      ~48.0 @ 2.3 ms -->
  <circle cx="154" cy="307" r="5" class="pt detr"/>
  <text x="162" y="310" class="leg">RF-DETR-N</text>
  <!-- RF-DETR-L      ~56.5 @ 6.8 ms -->
  <circle cx="298" cy="208" r="8" class="pt detr"/>
  <text x="306" y="211" class="leg">RF-DETR-L</text>
  <!-- RF-DETR-2XL    ~60.1 @ 13.2 ms -->
  <circle cx="502" cy="167" r="10" class="pt detr"/>
  <text x="510" y="170" class="leg">RF-DETR-2XL</text>

  <!-- RT-DETRv3-R50  ~54.6 @ 9.3 ms -->
  <circle cx="378" cy="231" r="7" class="pt rt"/>
  <text x="386" y="234" class="leg">RT-DETRv3-R50</text>

  <!-- legend -->
  <g transform="translate(560,80)">
    <rect x="0" y="-14" width="170" height="98" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.5"/>
    <circle cx="14" cy="0"  r="5" class="pt yolo"/><text x="26" y="4"  class="leg">YOLO26 family</text>
    <circle cx="14" cy="20" r="5" class="pt detr"/><text x="26" y="24" class="leg">RF-DETR (ICLR'26)</text>
    <circle cx="14" cy="40" r="5" class="pt deim"/><text x="26" y="44" class="leg">DEIMv2</text>
    <circle cx="14" cy="60" r="5" class="pt dfine"/><text x="26" y="64" class="leg">D-FINE</text>
    <circle cx="14" cy="80" r="5" class="pt rt"/><text x="26" y="84" class="leg">RT-DETRv3</text>
  </g>
</svg>
