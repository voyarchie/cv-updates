<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="12">
  <!-- Background -->
  <rect width="760" height="480" fill="#ffffff"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">COCO mAP vs. T4 latency – representative 2025–2026 detectors</text>
  <text x="380" y="46" text-anchor="middle" font-size="11" fill="#475569">Approximate published numbers; real-time region shaded green (≤ ~10 ms on T4 / FP16)</text>

  <!-- Plot area -->
  <rect x="80" y="70" width="620" height="340" fill="#f8fafc" stroke="#cbd5e1"/>

  <!-- Real-time band 0..10 ms maps roughly to first 1/3 of x axis (0..15 ms scale) -->
  <rect x="80" y="70" width="413" height="340" fill="#bbf7d0" fill-opacity="0.35"/>
  <text x="286" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Real-time region</text>

  <!-- Y axis (mAP) gridlines: 40, 45, 50, 55, 60, 65 -->
  <g stroke="#e2e8f0" stroke-width="1">
    <line x1="80" y1="138" x2="700" y2="138"/>
    <line x1="80" y1="206" x2="700" y2="206"/>
    <line x1="80" y1="274" x2="700" y2="274"/>
    <line x1="80" y1="342" x2="700" y2="342"/>
  </g>
  <g fill="#475569" font-size="10" text-anchor="end">
    <text x="74" y="142">65</text>
    <text x="74" y="210">60</text>
    <text x="74" y="278">55</text>
    <text x="74" y="346">50</text>
    <text x="74" y="414">45</text>
  </g>

  <!-- X axis ticks at 0, 5, 10, 15, 20, 25 ms -->
  <g stroke="#cbd5e1" stroke-width="1">
    <line x1="80" y1="410" x2="700" y2="410"/>
    <line x1="80" y1="410" x2="80" y2="416"/>
    <line x1="204" y1="410" x2="204" y2="416"/>
    <line x1="328" y1="410" x2="328" y2="416"/>
    <line x1="452" y1="410" x2="452" y2="416"/>
    <line x1="576" y1="410" x2="576" y2="416"/>
    <line x1="700" y1="410" x2="700" y2="416"/>
  </g>
  <g fill="#475569" font-size="10" text-anchor="middle">
    <text x="80" y="430">0</text>
    <text x="204" y="430">5</text>
    <text x="328" y="430">10</text>
    <text x="452" y="430">15</text>
    <text x="576" y="430">20</text>
    <text x="700" y="430">25</text>
  </g>

  <text x="390" y="455" text-anchor="middle" fill="#334155" font-size="12">Latency (ms, T4 / FP16, smaller = faster)</text>
  <text x="22" y="240" text-anchor="middle" fill="#334155" font-size="12" transform="rotate(-90 22 240)">COCO mAP @ 0.5:0.95</text>

  <!-- Helper:
       x = 80 + (latency_ms / 25) * 620
       y = 410 - ((mAP - 45) / 20) * 340
       Approximations:
       YOLOv12-N    ~  1.6 ms,  40.6 mAP  (off-chart low) -> use 41
       YOLO26-S     ~  2.5 ms,  45.6 mAP
       YOLOv13-S    ~  3.5 ms,  48.0 mAP
       RF-DETR-N    ~  2.3 ms,  48.0 mAP
       RF-DETR-M    ~  4.5 ms,  54.7 mAP
       RF-DETR-L    ~  6.8 ms,  56.5 mAP
       RF-DETR-2XL  ~ 12.6 ms,  60.1 mAP
       RT-DETRv3-L  ~  9.0 ms,  54.6 mAP
       D-FINE-X     ~ 12.0 ms,  55.8 mAP
       Co-DETR Swin-L (offline) ~ 22 ms, 64.0 mAP
       DETA Swin-L  ~ 24 ms,  63.5 mAP
  -->

  <!-- Points -->
  <g>
    <!-- YOLO26-S 2.5 ms / 45.6 -->
    <circle cx="142" cy="319" r="6" fill="#2563eb" stroke="#1e40af" stroke-width="1.5"/>
    <text x="150" y="316" fill="#1e3a8a">YOLO26-S</text>
    <!-- YOLOv13-S 3.5 ms / 48.0 -->
    <circle cx="167" cy="278" r="6" fill="#2563eb" stroke="#1e40af" stroke-width="1.5"/>
    <text x="175" y="275" fill="#1e3a8a">YOLOv13-S</text>
    <!-- YOLOv12-S placed for reference -->
    <circle cx="192" cy="307" r="5" fill="#60a5fa" stroke="#1e40af" stroke-width="1"/>
    <text x="200" y="304" fill="#1e3a8a">YOLOv12-S</text>

    <!-- RF-DETR-N 2.3 ms / 48 -->
    <circle cx="137" cy="278" r="6" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.5"/>
    <text x="50" y="278" fill="#7f1d1d">RF-DETR-N</text>
    <!-- RF-DETR-M 4.5 ms / 54.7 -->
    <circle cx="192" cy="187" r="7" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.5"/>
    <text x="200" y="185" fill="#7f1d1d">RF-DETR-M</text>
    <!-- RF-DETR-L 6.8 ms / 56.5 -->
    <circle cx="249" cy="156" r="7" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.5"/>
    <text x="257" y="154" fill="#7f1d1d">RF-DETR-L</text>
    <!-- RF-DETR-2XL 12.6 ms / 60.1 -->
    <circle cx="392" cy="95" r="8" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.5"/>
    <text x="400" y="92" fill="#7f1d1d" font-weight="600">RF-DETR-2XL</text>

    <!-- RT-DETRv3-L 9 ms / 54.6 -->
    <circle cx="303" cy="188" r="6" fill="#9333ea" stroke="#581c87" stroke-width="1.5"/>
    <text x="311" y="186" fill="#581c87">RT-DETRv3-L</text>

    <!-- D-FINE-X 12 ms / 55.8 -->
    <circle cx="377" cy="167" r="6" fill="#9333ea" stroke="#581c87" stroke-width="1.5"/>
    <text x="385" y="165" fill="#581c87">D-FINE-X</text>

    <!-- Co-DETR Swin-L 22 ms / 64.0 -->
    <circle cx="625" cy="44" r="7" fill="#0d9488" stroke="#134e4a" stroke-width="1.5"/>
    <text x="633" y="42" fill="#134e4a">Co-DINO Swin-L</text>

    <!-- DETA Swin-L 24 ms / 63.5 -->
    <circle cx="675" cy="61" r="7" fill="#0d9488" stroke="#134e4a" stroke-width="1.5"/>
    <text x="555" y="61" fill="#134e4a">DETA Swin-L</text>
  </g>

  <!-- Legend -->
  <g transform="translate(95,95)">
    <rect x="0" y="0" width="170" height="80" fill="#ffffff" stroke="#cbd5e1"/>
    <circle cx="14" cy="18" r="5" fill="#dc2626"/>
    <text x="26" y="22" fill="#0f172a">DETR-family (real-time)</text>
    <circle cx="14" cy="38" r="5" fill="#2563eb"/>
    <text x="26" y="42" fill="#0f172a">YOLO-family</text>
    <circle cx="14" cy="58" r="5" fill="#9333ea"/>
    <text x="26" y="62" fill="#0f172a">Hybrid / refinement</text>
    <circle cx="14" cy="74" r="5" fill="#0d9488"/>
    <text x="26" y="78" fill="#0f172a">Offline SOTA</text>
  </g>
</svg>
