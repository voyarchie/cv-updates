<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="Inter, system-ui, sans-serif" font-size="13" color="#475569">
  <title>Tracking-by-query propagation across frames</title>
  <desc>Detection queries are introduced for new objects and become track queries that propagate across frames; query-collision arises when detection and track queries fight for the same Hungarian assignment.</desc>

  <style>
    .frame    { fill: none; stroke: currentColor; stroke-width: 1.2; opacity: 0.9; }
    .frame-bg { fill: currentColor; opacity: 0.04; }
    .label    { fill: currentColor; opacity: 0.95; }
    .title    { fill: currentColor; font-weight: 600; font-size: 15px; }
    .caption  { fill: currentColor; opacity: 0.7;  font-size: 11px; }
    .legend-t { fill: currentColor; opacity: 0.9; font-size: 12px; }
    .det      { fill: #f59e0b; stroke: #b45309; stroke-width: 1.2; }
    .trk      { fill: #6366f1; stroke: #4338ca; stroke-width: 1.2; }
    .new      { fill: #22c55e; stroke: #15803d; stroke-width: 1.2; }
    .arr      { fill: none;    stroke: currentColor; stroke-width: 1.4; opacity: 0.65; }
    .arr-clr  { fill: none;    stroke: #ef4444; stroke-width: 1.6; stroke-dasharray: 4 3; opacity: 0.85; }
  </style>

  <text class="title"   x="32" y="28">Tracking-by-query: propagation, refresh, and the collision problem</text>
  <text class="caption" x="32" y="46">Detection queries (orange) become track queries (indigo). New-borns enter on the right.</text>

  <!-- Three frames -->
  <g>
    <rect class="frame-bg" x="60"  y="80" width="180" height="220"/>
    <rect class="frame"    x="60"  y="80" width="180" height="220" rx="6"/>
    <text class="label"    x="150" y="318" text-anchor="middle">Frame t-1</text>

    <rect class="frame-bg" x="290" y="80" width="180" height="220"/>
    <rect class="frame"    x="290" y="80" width="180" height="220" rx="6"/>
    <text class="label"    x="380" y="318" text-anchor="middle">Frame t</text>

    <rect class="frame-bg" x="520" y="80" width="180" height="220"/>
    <rect class="frame"    x="520" y="80" width="180" height="220" rx="6"/>
    <text class="label"    x="610" y="318" text-anchor="middle">Frame t+1</text>
  </g>

  <!-- Track queries (per-frame circles) -->
  <g>
    <!-- Frame t-1 -->
    <circle class="trk" cx="100" cy="130" r="11"/>
    <circle class="trk" cx="160" cy="170" r="11"/>
    <circle class="trk" cx="120" cy="240" r="11"/>
    <circle class="det" cx="210" cy="200" r="9"/>

    <!-- Frame t -->
    <circle class="trk" cx="330" cy="135" r="11"/>
    <circle class="trk" cx="395" cy="180" r="11"/>
    <circle class="trk" cx="355" cy="248" r="11"/>
    <circle class="new" cx="445" cy="125" r="11"/>
    <circle class="det" cx="445" cy="215" r="9"/>

    <!-- Frame t+1 -->
    <circle class="trk" cx="560" cy="142" r="11"/>
    <circle class="trk" cx="630" cy="190" r="11"/>
    <circle class="trk" cx="592" cy="255" r="11"/>
    <circle class="trk" cx="675" cy="130" r="11"/>
  </g>

  <!-- Propagation arrows -->
  <g>
    <path class="arr" d="M 111 130 C 220 110, 230 120, 330 135"/>
    <path class="arr" d="M 171 170 C 250 175, 270 175, 395 180"/>
    <path class="arr" d="M 131 240 C 220 250, 250 250, 355 248"/>

    <path class="arr" d="M 341 135 C 460 130, 460 130, 560 142"/>
    <path class="arr" d="M 406 180 C 510 185, 520 185, 630 190"/>
    <path class="arr" d="M 366 248 C 480 252, 500 252, 592 255"/>
    <path class="arr" d="M 456 125 C 540 125, 580 125, 675 130"/>
  </g>

  <!-- Collision marker -->
  <path class="arr-clr" d="M 220 200 C 320 200, 360 215, 445 215"/>
  <text class="caption" x="295" y="195" text-anchor="middle" fill="#ef4444" opacity="1">collision: det vs. drifting track</text>

  <!-- Legend -->
  <g transform="translate(60, 332)">
    <circle class="trk" cx="8"   cy="0" r="6"/>
    <text class="legend-t" x="22"  y="4">Track query</text>
    <circle class="det" cx="138" cy="0" r="6"/>
    <text class="legend-t" x="152" y="4">Detection query</text>
    <circle class="new" cx="288" cy="0" r="6"/>
    <text class="legend-t" x="302" y="4">New-born → track</text>
    <line x1="450" y1="0" x2="478" y2="0" class="arr-clr"/>
    <text class="legend-t" x="486" y="4">Hungarian collision (MATR / MOTRv3 target)</text>
  </g>
</svg>
